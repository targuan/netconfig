<div class="header">
  <h1>Global Tasks</h1>
  <mat-form-field appearance="outline">
    <mat-label>Filter by Status</mat-label>
    <mat-select (selectionChange)="onStatusChange($event.value)" placeholder="All Statuses">
      <mat-option [value]="null">All Statuses</mat-option>
      <mat-option value="pending_approval">Pending Approval</mat-option>
      <mat-option value="approved">Approved</mat-option>
      <mat-option value="queued">Queued</mat-option>
      <mat-option value="running">Running</mat-option>
      <mat-option value="success">Success</mat-option>
      <mat-option value="failed">Failed</mat-option>
    </mat-select>
  </mat-form-field>
</div>

<table mat-table [dataSource]="(tasks$ | async) || []" class="mat-elevation-z8">
  <ng-container matColumnDef="device">
    <th mat-header-cell *matHeaderCellDef> Device </th>
    <td mat-cell *matCellDef="let task">
        <a [routerLink]="['/devices', task.device]">View Device</a>
    </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> Status </th>
    <td mat-cell *matCellDef="let task">
      <app-task-status-chip [status]="task.status" [progress]="task.progress"></app-task-status-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="created">
    <th mat-header-cell *matHeaderCellDef> Created </th>
    <td mat-cell *matCellDef="let task"> {{task.created_at | date:'short'}} </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let task">
      <button mat-icon-button color="primary" (click)="viewLogs(task)" title="View Logs">
        <mat-icon>terminal</mat-icon>
      </button>
      <button mat-icon-button color="accent" *ngIf="task.status === 'pending_approval'" (click)="approveTask(task.id)" title="Approve">
        <mat-icon>check_circle</mat-icon>
      </button>
      <button mat-icon-button color="accent" *ngIf="task.status === 'approved'" (click)="queueTask(task.id)" title="Schedule">
        <mat-icon>schedule</mat-icon>
      </button>
      <button mat-icon-button color="warn" *ngIf="task.status === 'queued'" (click)="runTask(task.id)" title="Run Now">
        <mat-icon>play_arrow</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
