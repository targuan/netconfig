<div *ngIf="device$ | async as device" class="container">
  <div class="header">
    <h1>{{device.name}} <small>({{device.ip_address}})</small></h1>
    <button mat-stroked-button color="primary" routerLink="/devices">
      <mat-icon>arrow_back</mat-icon> Back to List
    </button>
  </div>

  <div class="grid">
    <mat-card class="info-card">
      <mat-card-header>
        <mat-card-title>Device Info</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p><strong>Vendor:</strong> {{device.vendor}}</p>
        <p><strong>Driver:</strong> {{device.napalm_driver}}</p>
        <p><strong>ID:</strong> {{device.id}}</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="config-card">
      <mat-card-header>
        <mat-card-title>Configuration</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Config Content</mat-label>
          <textarea matInput rows="10" [(ngModel)]="configContent"></textarea>
        </mat-form-field>
        <div *ngIf="currentVersion" class="version-info">
          Current Version: v{{currentVersion}}
        </div>
      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-raised-button color="primary" (click)="saveConfig(device.id)">
          <mat-icon>save</mat-icon> Save Config
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <mat-card class="tasks-card">
    <mat-card-header>
      <mat-card-title>Related Tasks</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="(tasks$ | async) || []" class="full-width">
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let task">
            <app-task-status-chip [status]="task.status" [progress]="task.progress"></app-task-status-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="created">
          <th mat-header-cell *matHeaderCellDef> Created </th>
          <td mat-cell *matCellDef="let task"> {{task.created_at | date:'short'}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let task">
            <button mat-icon-button color="primary" (click)="viewLogs(task)" title="View Logs">
              <mat-icon>terminal</mat-icon>
            </button>
            <button mat-icon-button color="accent" *ngIf="task.status === 'pending_approval'" (click)="approveTask(task.id)" title="Approve">
              <mat-icon>check_circle</mat-icon>
            </button>
            <button mat-icon-button color="accent" *ngIf="task.status === 'approved'" (click)="queueTask(task.id)" title="Schedule">
              <mat-icon>schedule</mat-icon>
            </button>
            <button mat-icon-button color="warn" *ngIf="task.status === 'queued'" (click)="runTask(task.id)" title="Run Now">
              <mat-icon>play_arrow</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
